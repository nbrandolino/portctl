static-build:
  image: rust:alpine
  stage: build
  tags:
    - lab

  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

  cache:
    key: "rust:alpine"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - .cargo/bin/
      - .rustup/

  before_script:
    - apk update
    - apk upgrade
    - apk add --no-cache gcc musl-dev openssl-dev openssl-libs-static pkgconf git
    - rustup default stable
    - rustup target add x86_64-unknown-linux-musl

  script:
    - cargo build --release --target x86_64-unknown-linux-musl

  artifacts:
    paths:
      - target/x86_64-unknown-linux-musl/release/portctl
    expire_in: 1 month
