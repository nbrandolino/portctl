.test_template:
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"

  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'

  cache:
    key: "$CI_JOB_IMAGE"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - .cargo/bin/
      - .rustup/

  before_script:
    - '. /etc/os-release; [ "$ID" != "fedora" ] && dnf install -y epel-release'
    - dnf install -y gcc gcc-c++ openssl-devel pkgconf-pkg-config git
    - command -v cargo || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source "$CARGO_HOME/env"

  script:
    - cargo build
    - cargo test
